<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX v3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e53935;
            --red-hover: #c62828;
            --red-glow: rgba(229,57,53,0.3);
            --bg: #000000;
            --bg-card: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
            --text-muted: #666666;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* Matrix Rain Canvas */
        #matrixCanvas {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 24px;
            max-width: 420px;
            width: 100%;
        }
        /* Login card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px 24px;
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -1px; left: 20%; right: 20%;
            height: 1px;
            background: var(--red);
            box-shadow: 0 0 12px var(--red-glow);
        }
        .login-card input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 1px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-card input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        .login-card input::placeholder { color: #3a3d4a; }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--red);
            border: none;
            border-radius: 6px;
            color: #000;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .login-btn:hover {
            background: var(--red-hover);
            box-shadow: 0 0 24px var(--red-glow);
            letter-spacing: 5px;
        }
        .flash-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 14px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        @media (max-width: 500px) {
            .login-card { padding: 20px 16px; }
            .login-btn { font-size: 12px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <!-- Matrix Rain Canvas -->
    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <div class="login-card">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="/login">
                <input type="text" name="email" placeholder="IDENTIFIER" required autocomplete="off" aria-label="Email">
                <input type="password" name="password" placeholder="ACCESS KEY" required aria-label="Password">
                <button type="submit" class="login-btn">ENTER</button>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // MATRIX RAIN CANVAS
        // ============================================================
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const matrixChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[]|\\^~';
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = [];
        
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.floor(Math.random() * canvas.height / fontSize);
        }
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < drops.length; i++) {
                const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                const x = i * fontSize;
                const y = drops[i] * fontSize;
                
                // Brighter at top, dimmer at bottom
                const brightness = 1 - (y / canvas.height) * 0.5;
                const opacity = Math.random() * 0.3 + 0.5;
                ctx.fillStyle = `rgba(229, 57, 53, ${opacity * brightness})`;
                ctx.font = fontSize + 'px "JetBrains Mono", monospace';
                ctx.fillText(char, x, y);
                
                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 50);
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
