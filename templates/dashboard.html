<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX — Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #ccc;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
            pointer-events: none;
            z-index: 999;
        }
        
        .header {
            position: relative;
            z-index: 1;
            background: #050505;
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-logo {
            font-size: 20px;
            font-weight: 900;
            color: #ff0000;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 11px;
        }
        
        .header-right a {
            color: #555;
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        
        .header-right a:hover { color: #ff0000; }
        
        .main {
            position: relative;
            z-index: 1;
            padding: 20px 25px;
            max-width: 1500px;
            margin: 0 auto;
        }
        
        .target-section {
            background: #050505;
            border: 1px solid #1a1a1a;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .target-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .target-input {
            flex: 1;
            min-width: 280px;
            padding: 12px 16px;
            background: #000;
            border: 1px solid #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 1px;
            outline: none;
        }
        
        .target-input:focus { border-color: #ff0000; }
        .target-input::placeholder { color: #333; }
        
        .btn {
            padding: 12px 22px;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            background: transparent;
            color: #ccc;
        }
        
        .btn:hover { border-color: #ff0000; color: #ff0000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .btn-full { background: rgba(255,0,0,0.1); border-color: #ff0000; color: #ff0000; }
        .btn-full:hover { background: rgba(255,0,0,0.2); box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        
        .btn-exploit { background: rgba(255,0,0,0.15); border-color: #ff0000; color: #ff0000; }
        .btn-exploit:hover { background: rgba(255,0,0,0.3); }
        
        .btn-tool { border-color: #333; color: #666; font-size: 10px; padding: 8px 14px; }
        .btn-tool:hover { border-color: #ff0000; color: #ff0000; }
        
        .anonymity-bar {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .anon-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 6px 12px;
            border: 1px solid #1a1a1a;
            background: #000;
            transition: all 0.3s;
        }
        
        .anon-toggle:hover { border-color: #333; }
        .anon-toggle.active { border-color: #ff0000; color: #ff0000; }
        
        .anon-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #333;
        }
        
        .anon-toggle.active .anon-dot { background: #ff0000; box-shadow: 0 0 8px #ff0000; }
        
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }
        
        .panel {
            background: #050505;
            border: 1px solid #1a1a1a;
        }
        
        .panel-header {
            padding: 12px 18px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 11px;
            letter-spacing: 3px;
            color: #ff0000;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-body {
            padding: 15px 18px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .feed-entry {
            padding: 5px 0;
            font-size: 11px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            line-height: 1.5;
        }
        
        .feed-entry .time { color: #333; margin-right: 8px; }
        .feed-entry.success { color: #00ff00; }
        .feed-entry.warning { color: #ff0000; }
        .feed-entry.error { color: #ff4444; }
        .feed-entry.info { color: #555; }
        
        .vuln-card {
            background: #000;
            border: 1px solid #1a1a1a;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .vuln-card:hover { border-color: #333; }
        .vuln-card.selected { border-color: #ff0000; background: rgba(255,0,0,0.03); }
        
        .vuln-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .vuln-type { font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        
        .severity {
            font-size: 9px;
            padding: 2px 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
        
        .severity.critical { background: rgba(255,0,0,0.15); color: #ff0000; border: 1px solid rgba(255,0,0,0.3); }
        .severity.high { background: rgba(255,100,0,0.15); color: #ff6400; border: 1px solid rgba(255,100,0,0.3); }
        .severity.medium { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
        .severity.low { background: rgba(0,255,0,0.1); color: #00ff00; border: 1px solid rgba(0,255,0,0.2); }
        
        .vuln-endpoint { font-size: 10px; color: #555; margin-bottom: 4px; }
        .vuln-desc { font-size: 10px; color: #777; line-height: 1.4; }
        
        .vuln-checkbox { accent-color: #ff0000; cursor: pointer; margin-right: 8px; }
        
        .progress-bar {
            height: 2px;
            background: #1a1a1a;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: #ff0000;
            transition: width 0.5s;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        
        .summary-bar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        
        .summary-item {
            font-size: 10px;
            letter-spacing: 1px;
            padding: 6px 12px;
            background: #000;
            border: 1px solid #1a1a1a;
        }
        
        .exploit-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            font-size: 9px;
            letter-spacing: 2px;
        }
        
        .status-badge.running { background: rgba(255,200,0,0.1); color: #ffc800; border: 1px solid rgba(255,200,0,0.3); }
        .status-badge.completed { background: rgba(0,255,0,0.1); color: #00ff00; border: 1px solid rgba(0,255,0,0.2); }
        .status-badge.failed { background: rgba(255,0,0,0.1); color: #ff0000; border: 1px solid rgba(255,0,0,0.3); }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #333;
            font-size: 12px;
            letter-spacing: 2px;
        }
        
        .tool-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb:hover { background: #ff0000; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">APEX</div>
        <div class="header-right">
            <span style="color:#444;">Apex@gmail.com</span>
            <a href="/ransomware/preview">RANSOMWARE EDITOR</a>
            <a href="/logout">LOGOUT</a>
        </div>
    </div>
    
    <div class="main">
        <!-- Target Input -->
        <div class="target-section">
            <div class="target-row">
                <input type="text" class="target-input" id="targetInput" placeholder="Enter target URL (e.g., https://example.com)">
                <button class="btn btn-full" id="fullScanBtn" onclick="startScan('full')">FULL SCAN</button>
                <button class="btn" id="quickScanBtn" onclick="startScan('quick')">QUICK</button>
                <button class="btn btn-exploit" id="exploitBtn" onclick="runExploits()" disabled>EXPLOIT (0)</button>
            </div>
            
            <div class="anonymity-bar">
                <div class="anon-toggle" id="proxyToggle" onclick="toggleAnon('proxy')">
                    <div class="anon-dot"></div>
                    PROXY CHAIN
                </div>
                <div class="anon-toggle" id="torToggle" onclick="toggleAnon('tor')">
                    <div class="anon-dot"></div>
                    TOR
                </div>
                <div class="anon-toggle" id="vpnToggle" onclick="toggleAnon('vpn')">
                    <div class="anon-dot"></div>
                    VPN
                </div>
                <span style="margin-left:auto;" id="scanStatus"></span>
            </div>
            
            <div class="progress-bar" id="progressBar" style="display:none;">
                <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>
        
        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Live Feed -->
            <div class="panel">
                <div class="panel-header">LIVE FEED <span style="font-size:9px;color:#333;">WEBSOCKET</span></div>
                <div class="panel-body" id="liveFeed">
                    <div class="empty-state">AWAITING TARGET...</div>
                </div>
            </div>
            
            <!-- Results -->
            <div class="panel">
                <div class="panel-header">
                    VULNERABILITIES
                    <div class="tool-links">
                        <button class="btn btn-tool" onclick="window.open('/ransomware/preview')">RANSOMWARE EDITOR</button>
                    </div>
                </div>
                <div class="panel-body" id="resultsPanel">
                    <div class="empty-state">ENTER TARGET AND RUN SCAN</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentScanId = null;
        let vulnerabilities = [];
        let selectedVulns = new Set();
        let proxyEnabled = false, torEnabled = false, vpnEnabled = false;
        
        socket.on('connect', () => console.log('Connected'));
        
        socket.on('feed_update', (entry) => addFeedEntry(entry));
        socket.on('feed_history', (history) => history.forEach(e => addFeedEntry(e)));
        
        socket.on('progress_update', (data) => {
            if (data.scan_id === currentScanId) {
                document.getElementById('progressBar').style.display = 'block';
                document.getElementById('progressFill').style.width = data.progress + '%';
            }
        });
        
        socket.on('scan_complete', (data) => {
            vulnerabilities = data.vulnerabilities;
            selectedVulns.clear();
            renderVulnerabilities(data.vulnerabilities, data.summary);
            document.getElementById('fullScanBtn').disabled = false;
            document.getElementById('quickScanBtn').disabled = false;
            document.getElementById('exploitBtn').disabled = true;
            document.getElementById('scanStatus').innerHTML = '<span class="status-badge completed">COMPLETE</span>';
        });
        
        socket.on('exploit_complete', (data) => {
            document.getElementById('exploitBtn').disabled = false;
            document.getElementById('scanStatus').innerHTML = '<span class="status-badge completed">DONE</span>';
        });
        
        function addFeedEntry(entry) {
            const feed = document.getElementById('liveFeed');
            if (feed.querySelector('.empty-state')) feed.innerHTML = '';
            const div = document.createElement('div');
            div.className = `feed-entry ${entry.level}`;
            div.innerHTML = `<span class="time">[${entry.timestamp}]</span>${entry.message}`;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }
        
        function toggleAnon(type) {
            const toggles = { proxy: 'proxyToggle', tor: 'torToggle', vpn: 'vpnToggle' };
            const states = { proxy: proxyEnabled, tor: torEnabled, vpn: vpnEnabled };
            const newState = !states[type];
            
            if (type === 'proxy') proxyEnabled = newState;
            if (type === 'tor') torEnabled = newState;
            if (type === 'vpn') vpnEnabled = newState;
            
            const el = document.getElementById(toggles[type]);
            if (newState) el.classList.add('active');
            else el.classList.remove('active');
            
            fetch(`/api/${type}/toggle`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({enabled: newState})
            });
        }
        
        function startScan(type) {
            const target = document.getElementById('targetInput').value.trim();
            if (!target) {
                addFeedEntry({timestamp: new Date().toTimeString().slice(0,8), message: 'Enter a target URL', level: 'error'});
                return;
            }
            
            document.getElementById('fullScanBtn').disabled = true;
            document.getElementById('quickScanBtn').disabled = true;
            document.getElementById('exploitBtn').disabled = true;
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('scanStatus').innerHTML = '<span class="status-badge running">SCANNING...</span>';
            document.getElementById('resultsPanel').innerHTML = '<div class="empty-state">SCANNING...</div>';
            document.getElementById('liveFeed').innerHTML = '';
            vulnerabilities = [];
            selectedVulns.clear();
            
            fetch('/api/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target: target, scan_type: type})
            })
            .then(r => r.json())
            .then(data => { currentScanId = data.scan_id; })
            .catch(err => {
                addFeedEntry({timestamp: new Date().toTimeString().slice(0,8), message: 'Failed to start scan', level: 'error'});
                document.getElementById('fullScanBtn').disabled = false;
                document.getElementById('quickScanBtn').disabled = false;
            });
        }
        
        function renderVulnerabilities(vulns, summary) {
            const panel = document.getElementById('resultsPanel');
            if (!vulns || vulns.length === 0) {
                panel.innerHTML = '<div class="empty-state">NO VULNERABILITIES FOUND</div>';
                return;
            }
            
            let html = '<div class="summary-bar">';
            if (summary.critical > 0) html += `<div class="summary-item">🔴 CRITICAL: ${summary.critical}</div>`;
            if (summary.high > 0) html += `<div class="summary-item">🟠 HIGH: ${summary.high}</div>`;
            if (summary.medium > 0) html += `<div class="summary-item">🟡 MEDIUM: ${summary.medium}</div>`;
            if (summary.low > 0) html += `<div class="summary-item">🟢 LOW: ${summary.low}</div>`;
            html += '</div>';
            
            const severityOrder = {'critical': 0, 'high': 1, 'medium': 2, 'low': 3};
            vulns.sort((a, b) => (severityOrder[a.severity] || 4) - (severityOrder[b.severity] || 4));
            
            vulns.forEach((vuln, index) => {
                const sev = vuln.severity || 'low';
                const typeLabel = (vuln.type || 'UNKNOWN').toUpperCase();
                const isSelected = selectedVulns.has(index);
                
                html += `
                    <div class="vuln-card ${isSelected ? 'selected' : ''}" onclick="toggleVuln(${index}, this)">
                        <div class="vuln-header">
                            <span class="vuln-type">
                                <input type="checkbox" class="vuln-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleVuln(${index}, this.parentElement.parentElement)">
                                ${typeLabel}
                            </span>
                            <span class="severity ${sev}">${sev.toUpperCase()}</span>
                        </div>
                        <div class="vuln-endpoint">${vuln.endpoint || 'N/A'}</div>
                        <div class="vuln-desc">${vuln.description || ''}</div>
                        ${vuln.parameter ? `<div class="vuln-desc" style="color:#ff0000;">→ ${vuln.parameter}</div>` : ''}
                        ${vuln.payload ? `<div class="vuln-desc" style="color:#333;">→ ${vuln.payload.substring(0,80)}</div>` : ''}
                    </div>
                `;
            });
            
            html += `
                <div class="exploit-actions">
                    <button class="btn btn-exploit" id="exploitSelectedBtn" onclick="runExploits()" disabled>EXPLOIT (0)</button>
                    <button class="btn" onclick="selectAll()">SELECT ALL</button>
                    <button class="btn" onclick="clearAll()">CLEAR</button>
                </div>
            `;
            
            panel.innerHTML = html;
            updateExploitButton();
        }
        
        function toggleVuln(index, card) {
            if (selectedVulns.has(index)) {
                selectedVulns.delete(index);
                card.classList.remove('selected');
                card.querySelector('.vuln-checkbox').checked = false;
            } else {
                selectedVulns.add(index);
                card.classList.add('selected');
                card.querySelector('.vuln-checkbox').checked = true;
            }
            updateExploitButton();
        }
        
        function selectAll() { vulnerabilities.forEach((_, i) => selectedVulns.add(i)); renderVulnerabilities(vulnerabilities, getSummary()); }
        function clearAll() { selectedVulns.clear(); renderVulnerabilities(vulnerabilities, getSummary()); }
        
        function getSummary() {
            const s = {critical: 0, high: 0, medium: 0, low: 0};
            vulnerabilities.forEach(v => { if (s[v.severity] !== undefined) s[v.severity]++; });
            return s;
        }
        
        function updateExploitButton() {
            const btn = document.getElementById('exploitSelectedBtn');
            const mainBtn = document.getElementById('exploitBtn');
            const count = selectedVulns.size;
            if (btn) { btn.innerHTML = `EXPLOIT (${count})`; btn.disabled = count === 0; }
            if (mainBtn) { mainBtn.innerHTML = `EXPLOIT (${count})`; mainBtn.disabled = count === 0; }
        }
        
        function runExploits() {
            if (selectedVulns.size === 0) return;
            const selectedData = Array.from(selectedVulns).map(i => vulnerabilities[i]);
            document.getElementById('exploitBtn').disabled = true;
            document.getElementById('scanStatus').innerHTML = '<span class="status-badge running">EXPLOITING...</span>';
            
            fetch('/api/exploit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({scan_id: currentScanId, vulnerabilities: selectedData})
            })
            .then(r => r.json())
            .catch(err => {
                addFeedEntry({timestamp: new Date().toTimeString().slice(0,8), message: 'Exploit failed', level: 'error'});
                document.getElementById('exploitBtn').disabled = false;
            });
        }
        
        socket.emit('request_feed');
    </script>
</body>
</html>
