<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX // Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="app">
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="logo" onclick="switchTab('dashboard')">🔺 APEX</div>
            <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">🏠 Dashboard</div>
            <div class="nav-item" data-tab="history" onclick="switchTab('history')">📜 History</div>
            <div class="nav-item" data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</div>
            <div class="sidebar-bottom">
                <span class="status-dot" id="connDot"></span>
                <span id="connText">ONLINE</span>
                <a href="/logout" class="exit-link">EXIT</a>
            </div>
        </nav>

        <!-- MAIN -->
        <div class="main">
            <!-- TOP BAR -->
            <div class="topbar">
                <input type="text" id="targetInput" placeholder="Target URL (https://example.com)" class="target-input">
                <button class="btn btn-orange" id="scanBtn" onclick="startScan()">🔍 SCAN</button>
                <button class="btn btn-red" id="nukeBtn" onclick="startNuke()">☢️ NUKE</button>
                <div class="toggles">
                    <span class="toggle" id="proxyToggle" onclick="toggleAnon('proxy')">PROXY</span>
                    <span class="toggle" id="torToggle" onclick="toggleAnon('tor')">TOR</span>
                    <span class="toggle" id="vpnToggle" onclick="toggleAnon('vpn')">VPN</span>
                </div>
                <span id="scanStatus" class="scan-status"></span>
            </div>

            <!-- DASHBOARD TAB -->
            <div class="tab active" id="tab-dashboard">
                <div class="dashboard-grid">
                    <!-- BROWSER PANEL -->
                    <div class="panel browser-panel">
                        <div class="panel-header">🌐 BROWSER</div>
                        <div class="browser-controls">
                            <input type="text" id="browserUrl" placeholder="Enter URL to browse..." onkeydown="if(event.key==='Enter')browserNavigate()">
                            <button class="btn btn-orange btn-sm" onclick="browserNavigate()">GO</button>
                            <button class="btn btn-sm" onclick="browserNavigate(document.getElementById('browserUrl').value, true)">SCAN+GO</button>
                        </div>
                        <div class="browser-frame-wrap">
                            <div class="browser-loading" id="browserLoading">
                                <span>🌐 Loading through proxy...</span>
                                <span id="browserLoadingUrl"></span>
                            </div>
                            <iframe id="browserFrame" sandbox="allow-scripts allow-same-origin allow-forms" src="about:blank"></iframe>
                        </div>
                    </div>

                    <!-- RESULTS PANEL -->
                    <div class="panel results-panel">
                        <div class="panel-header">💣 RESULTS <span id="vulnCount">0</span></div>
                        <div class="panel-body" id="resultsPanel">
                            <div class="empty">Enter a target and click SCAN</div>
                        </div>
                    </div>
                </div>

                <!-- AI CHAT -->
                <div class="ai-chat">
                    <div class="ai-messages" id="aiMessages">
                        <div class="ai-msg ai">APEX AI ready. Ask me about targets, vulnerabilities, or next steps.</div>
                    </div>
                    <div class="ai-input-row">
                        <textarea id="aiInput" placeholder="Ask AI..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAi();}"></textarea>
                        <button class="btn btn-orange btn-sm" onclick="sendAi()">▶</button>
                    </div>
                </div>
            </div>

            <!-- HISTORY TAB -->
            <div class="tab" id="tab-history">
                <div class="panel" style="flex:1;">
                    <div class="panel-header">📜 SCAN HISTORY</div>
                    <div class="panel-body" id="historyPanel">
                        <div class="empty">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- SETTINGS TAB -->
            <div class="tab" id="tab-settings">
                <div class="settings-grid">
                    <div class="panel">
                        <div class="panel-header">🤖 AI CONFIG</div>
                        <div class="panel-body">
                            <label>API Key</label>
                            <input type="password" id="setApiKey" placeholder="ollama or your key">
                            <label>Base URL</label>
                            <input type="text" id="setBaseUrl" placeholder="https://api.ollama.com/v1">
                            <label>Model</label>
                            <input type="text" id="setModel" placeholder="deepseek-v4-pro">
                            <button class="btn btn-orange btn-sm" onclick="saveAiSettings()">💾 SAVE</button>
                            <button class="btn btn-sm" onclick="testAi()">🔌 TEST</button>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">🔒 RANSOMWARE</div>
                        <div class="panel-body">
                            <label>Image URL</label>
                            <input type="text" id="setRansomImg" placeholder="https://i.imgur.com/xxx.png">
                            <label>Message</label>
                            <textarea id="setRansomMsg" placeholder="Your files have been encrypted..."></textarea>
                            <button class="btn btn-orange btn-sm" onclick="saveRansomSettings()">💾 SAVE</button>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">💉 XSS DEFACE</div>
                        <div class="panel-body">
                            <label>Image URL</label>
                            <input type="text" id="setDefaceImg" placeholder="https://i.imgur.com/xxx.png">
                            <label>Message</label>
                            <textarea id="setDefaceMsg" placeholder="Hacked by..."></textarea>
                            <button class="btn btn-orange btn-sm" onclick="saveDefaceSettings()">💾 SAVE</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/static/js/app.js?v=5"></script>
</body>
</html>
